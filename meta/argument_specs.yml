---
# Role argument spec for mosquitto. Validated at role start, so a missing or
# mistyped variable fails fast. This is the role's complete variable surface;
# structural defaults live in defaults/main.yml (values not restated here, to
# avoid drift).
#
# Requires ansible-core >= 2.11.

argument_specs:
  main:
    short_description: Mosquitto MQTT broker on Debian.
    description:
      - Installs mosquitto, configures an authenticated listener with a password
        file (anonymous disabled by default) and persistence, and manages the
        systemd service. See README.md for the full picture.
    options:

      mosquitto_users:
        type: list
        elements: dict
        required: false
        description:
          - MQTT accounts to provision. Supply via the consumer's vault. With
            mosquitto_allow_anonymous false (the default) at least one is needed,
            or no client can connect.
        options:
          username:
            type: str
            required: true
            description: MQTT username.
          password:
            type: str
            required: true
            no_log: true
            description: MQTT password (plaintext in; hashed into the password file).

      mosquitto_package:
        type: str
        description: Debian package name (default "mosquitto").

      mosquitto_version:
        type: str
        description: Optional pinned apt version; empty tracks the distro's current.

      mosquitto_plaintext_listener_enabled:
        type: bool
        description:
          - Emit the plaintext listener (mosquitto_listen_port). Set false for
            a TLS-only broker (with mosquitto_tls_enabled true).

      mosquitto_listen_port:
        type: int
        description: TCP port for the plaintext listener.

      mosquitto_listen_address:
        type: str
        description: Plaintext bind address; empty binds all interfaces.

      mosquitto_allow_anonymous:
        type: bool
        description:
          - Allow unauthenticated clients. Applies to both listeners.

      mosquitto_tls_enabled:
        type: bool
        description:
          - Emit a TLS (MQTTS) listener. When true, mosquitto_tls_cafile /
            certfile / keyfile must be set to paths already present on the
            host (the role does not ship cert material).

      mosquitto_tls_listen_port:
        type: int
        description: TCP port for the TLS listener (conventionally 8883).

      mosquitto_tls_listen_address:
        type: str
        description: TLS bind address; empty binds all interfaces.

      mosquitto_tls_cafile:
        type: str
        description: Path to the CA cert that signed the server cert.

      mosquitto_tls_certfile:
        type: str
        description: Path to the server certificate (PEM).

      mosquitto_tls_keyfile:
        type: str
        description: Path to the server private key (PEM).

      mosquitto_tls_require_certificate:
        type: bool
        description:
          - Require clients to present a certificate (mutual TLS). Default
            false — encryption only; password auth still applies.

      mosquitto_config_dir:
        type: str
        description: Mosquitto config directory.

      mosquitto_conf_file:
        type: str
        description: Path of the role-managed listener config (under conf.d).

      mosquitto_password_file:
        type: str
        description: Path of the password file.

      mosquitto_user:
        type: str
        description: System user mosquitto runs as / owns the password file.

      mosquitto_group:
        type: str
        description: System group for the password file.

      mosquitto_service:
        type: str
        description: systemd service name.
