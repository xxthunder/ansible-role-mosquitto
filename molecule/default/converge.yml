---
- name: Converge
  hosts: all
  become: true
  tasks:
    # Generate a throwaway self-signed CA + broker cert with openssl so the
    # TLS listener has real material to bind against. Shelling out keeps the
    # CI deps minimal (no community.crypto collection needed). The mosquitto
    # user doesn't exist yet (created by the apt install inside the role),
    # so cert files are left root-owned; mode 0644 is enough for the broker
    # process to read at startup. Throwaway material in a CI container —
    # not a production pattern.
    - name: Ensure cert dir
      ansible.builtin.file:
        path: /etc/mosquitto/certs
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Ensure openssl is installed
      ansible.builtin.apt:
        name: openssl
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Generate throwaway CA + broker cert
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          cd /etc/mosquitto/certs
          openssl genrsa -out ca.key 2048
          openssl req -x509 -new -nodes -key ca.key -sha256 -days 1 \
            -subj "/CN=molecule-test-ca" -out ca.crt
          openssl genrsa -out broker.key 2048
          cat > broker.cnf <<'EOF'
          [req]
          distinguished_name = dn
          req_extensions = v3_req
          prompt = no
          [dn]
          CN = localhost
          [v3_req]
          subjectAltName = @alt
          [alt]
          DNS.1 = localhost
          IP.1 = 127.0.0.1
          EOF
          openssl req -new -key broker.key -out broker.csr -config broker.cnf
          openssl x509 -req -in broker.csr -CA ca.crt -CAkey ca.key \
            -CAcreateserial -out broker.pem -days 1 -sha256 \
            -extensions v3_req -extfile broker.cnf
          chmod 0644 ca.key ca.crt broker.key broker.pem
      args:
        executable: /bin/bash
        creates: /etc/mosquitto/certs/broker.pem

    - name: Install and configure mosquitto
      ansible.builtin.include_role:
        name: mosquitto
