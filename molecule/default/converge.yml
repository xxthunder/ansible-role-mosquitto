---
- name: Converge
  hosts: all
  become: true
  tasks:
    # Install mosquitto + openssl first so:
    #   - the mosquitto system user exists (needed to own the broker key
    #     readable by the service)
    #   - openssl is available for the throwaway cert gen below
    # The role's own apt task is then a no-op.
    #
    # mosquitto 2.0+ refuses to start if the keyfile is group/world readable,
    # so the broker key is mode 0600 owned mosquitto:mosquitto. The cert
    # material is throwaway (1-day self-signed) and not committed.
    - name: Install mosquitto and openssl
      ansible.builtin.apt:
        name:
          - mosquitto
          - openssl
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure cert dir
      ansible.builtin.file:
        path: /etc/mosquitto/certs
        state: directory
        owner: mosquitto
        group: mosquitto
        mode: "0750"

    - name: Generate throwaway CA + broker cert
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          cd /etc/mosquitto/certs
          openssl genrsa -out ca.key 2048
          openssl req -x509 -new -nodes -key ca.key -sha256 -days 1 \
            -subj "/CN=molecule-test-ca" -out ca.crt
          openssl genrsa -out broker.key 2048
          cat > broker.cnf <<'EOF'
          [req]
          distinguished_name = dn
          req_extensions = v3_req
          prompt = no
          [dn]
          CN = localhost
          [v3_req]
          subjectAltName = @alt
          [alt]
          DNS.1 = localhost
          IP.1 = 127.0.0.1
          EOF
          openssl req -new -key broker.key -out broker.csr -config broker.cnf
          openssl x509 -req -in broker.csr -CA ca.crt -CAkey ca.key \
            -CAcreateserial -out broker.pem -days 1 -sha256 \
            -extensions v3_req -extfile broker.cnf
          chown mosquitto:mosquitto ca.crt ca.key broker.key broker.pem
          chmod 0600 ca.key broker.key
          chmod 0644 ca.crt broker.pem
      args:
        executable: /bin/bash
        creates: /etc/mosquitto/certs/broker.pem

    - name: Install and configure mosquitto
      block:
        - name: Apply mosquitto role
          ansible.builtin.include_role:
            name: mosquitto
      rescue:
        # Surface why mosquitto failed to start, then re-raise.
        - name: Dump mosquitto journal
          ansible.builtin.command: journalctl -u mosquitto -n 80 --no-pager
          register: mosquitto_journal
          changed_when: false
          failed_when: false
        - name: Show mosquitto journal
          ansible.builtin.debug:
            var: mosquitto_journal.stdout_lines
        - name: Re-raise the original failure
          ansible.builtin.fail:
            msg: mosquitto role failed — see journal above
