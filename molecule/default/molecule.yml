---
# Converges the role in a systemd-enabled Debian container, then idempotency-
# checks and verifies. A test user is injected via host_vars so the
# authenticated-listener path is exercised.
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: mosquitto-instance
    image: geerlingguy/docker-debian12-ansible:latest
    command: /lib/systemd/systemd
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    pre_build_image: true
provisioner:
  name: ansible
  inventory:
    host_vars:
      mosquitto-instance:
        mosquitto_users:
          - username: testuser
            password: testpass
verifier:
  name: ansible
