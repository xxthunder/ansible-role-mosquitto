---
# Converges the role in a systemd-enabled Debian container, then idempotency-
# checks and verifies. A test user is injected via host_vars so the
# authenticated-listener path is exercised.
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: mosquitto-instance
    image: geerlingguy/docker-debian12-ansible:latest
    command: /lib/systemd/systemd
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    pre_build_image: true
provisioner:
  name: ansible
  inventory:
    host_vars:
      mosquitto-instance:
        mosquitto_users:
          - username: testuser
            password: testpass
        # TLS path is exercised alongside the plaintext one. Cert material is
        # generated inside converge.yml against a throwaway self-signed CA, so
        # no fixture files are committed to the repo.
        mosquitto_tls_enabled: true
        mosquitto_tls_cafile: /etc/mosquitto/certs/ca.crt
        mosquitto_tls_certfile: /etc/mosquitto/certs/broker.pem
        mosquitto_tls_keyfile: /etc/mosquitto/certs/broker.key
verifier:
  name: ansible
